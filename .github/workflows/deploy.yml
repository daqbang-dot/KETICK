name: Deploy KETICK to GitHub Pages

on:
  push:
    branches: ["main"] # Pastikan nama branch anda 'main'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build' # React simpan hasil build di sini

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
